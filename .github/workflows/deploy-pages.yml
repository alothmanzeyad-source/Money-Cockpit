name: Android APK bauen

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK einrichten
        uses: android-actions/setup-android@v3

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Web-App bauen
        run: npm run build

      - name: Capacitor Android-Projekt erzeugen
        run: |
          npx cap add android
          npx cap sync android

      - name: Gradle ausführbar machen
        run: chmod +x android/gradlew

      - name: Debug-APK bauen
        working-directory: android
        run: ./gradlew assembleDebug

      - name: APK als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: vermoegens-cockpit-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
